{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">

    <div class="vl-card p-4 mt-3">

      <!-- Header -->
      <div class="text-center mb-4">
        <div class="vl-icon-circle mx-auto mb-3">
          <i class="bi bi-heart-pulse-fill fs-3"></i>
        </div>
        <h2 class="fw-semibold mb-1">Welcome back</h2>
        <p class="text-muted small">Log in to track your health today</p>
      </div>

      <!-- Form -->
      <form method="POST" action="{{ url_for('auth.login') }}" novalidate>

        <div class="mb-3">
          <label for="email" class="form-label vl-label">Email address</label>
          <div class="input-group">
            <span class="input-group-text vl-input-icon">
              <i class="bi bi-envelope"></i>
            </span>
            <input type="email" id="email" name="email"
                   class="form-control vl-input"
                   placeholder="ananya@gmail.com"
                   value="{{ email or '' }}"
                   required autofocus>
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label vl-label">Password</label>
          <div class="input-group">
            <span class="input-group-text vl-input-icon">
              <i class="bi bi-lock"></i>
            </span>
            <input type="password" id="password" name="password"
                   class="form-control vl-input"
                   placeholder="Your password" required>
            <button type="button" class="btn vl-eye-btn" onclick="togglePw(this)">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <div class="mb-4">
          <div class="form-check">
            <input class="form-check-input vl-check"
                   type="checkbox" id="remember" name="remember">
            <label class="form-check-label text-muted small" for="remember">
              Remember me
            </label>
          </div>
        </div>

        <button type="submit" class="btn vl-btn-primary w-100 py-2">
          <i class="bi bi-box-arrow-in-right me-2"></i>Log in
        </button>
      </form>

      <hr class="my-4">
      <p class="text-center text-muted small mb-0">
        New to VitaLog?
        <a href="{{ url_for('auth.register') }}" class="vl-link fw-semibold">
          Create a free account
        </a>
      </p>

    </div>

    <p class="text-center text-muted small mt-3">
      <i class="bi bi-shield-check me-1 text-success"></i>
      Your data is private and never shared with anyone.
    </p>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePw(btn) {
  const input = document.getElementById("password");
  const icon  = btn.querySelector("i");
  if (input.type === "password") {
    input.type = "text";
    icon.classList.replace("bi-eye", "bi-eye-slash");
  } else {
    input.type = "password";
    icon.classList.replace("bi-eye-slash", "bi-eye");
  }
}
</script>
{% endblock %}
